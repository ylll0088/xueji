<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>学迹 · 智能学习</title>
    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式部分与之前完全相同（略，实际使用时保留全部样式） */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
        body { background:#F5F7FA; min-height:100vh; }
        .app-container { display:flex; flex-direction:column; min-height:100vh; background:#F5F7FA; }
        .top-bar { background:white; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #EDF0F5; position:sticky; top:0; z-index:100; }
        .logo-area { display:flex; align-items:center; gap:8px; }
        .logo { font-size:20px; font-weight:700; background:linear-gradient(135deg,#2B4BFF,#8A6EFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .date-badge { font-size:12px; color:#7F8C9F; background:#F0F2F5; padding:4px 10px; border-radius:30px; }
        .user-mini { display:flex; align-items:center; gap:12px; }
        .avatar-mini { width:40px; height:40px; border-radius:40px; background:linear-gradient(145deg,#2B4BFF,#8A6EFF); display:flex; align-items:center; justify-content:center; color:white; font-size:18px; cursor:pointer; }
        .logout-icon { font-size:20px; cursor:pointer; padding:4px; border-radius:50%; transition:background 0.2s; }
        .logout-icon:hover { background:#F0F4FF; }
        .nav-scroll { background:white; padding:12px 0; border-bottom:1px solid #EDF0F5; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
        .nav-scroll::-webkit-scrollbar { display:none; }
        .nav-items { display:inline-flex; padding:0 12px; gap:4px; }
        .nav-item { display:inline-flex; flex-direction:column; align-items:center; padding:6px 12px; border-radius:30px; color:#4A5A6E; font-size:12px; cursor:pointer; transition:0.2s; min-width:60px; }
        .nav-item.active { background:#2B4BFF; color:white; }
        .nav-icon { font-size:20px; margin-bottom:2px; }
        .content-area { flex:1; padding:16px; overflow-y:auto; }
        .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
        .stat-card { background:white; border-radius:16px; padding:16px 8px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.02); cursor:pointer; }
        .stat-card:active { background:#F0F4FF; }
        .stat-title { color:#7F8C9F; font-size:12px; margin-bottom:4px; }
        .stat-number { font-size:24px; font-weight:700; color:#1A2639; }
        .section-card { background:white; border-radius:20px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.02); }
        .card-title { font-size:16px; font-weight:600; color:#1A2639; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .subject-item { display:flex; align-items:center; margin-bottom:12px; }
        .subject-name { width:45px; font-size:14px; font-weight:500; }
        .progress-bar { flex:1; height:8px; background:#EDF2F7; border-radius:8px; margin:0 12px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#2B4BFF,#8A6EFF); border-radius:8px; }
        .subject-percent { font-size:13px; font-weight:500; color:#2B4BFF; width:40px; text-align:right; }
        .heatmap-grid { display:flex; gap:8px; justify-content:space-between; }
        .heat-item { flex:1; text-align:center; }
        .heat-subject { font-size:12px; color:#7F8C9F; margin-bottom:6px; }
        .heat-bar { height:80px; width:100%; background:#EDF2F7; border-radius:8px; margin-bottom:6px; position:relative; overflow:hidden; }
        .heat-fill { position:absolute; bottom:0; width:100%; background:linear-gradient(0deg,#2B4BFF,#8A6EFF); border-radius:8px; }
        .form-group { margin-bottom:16px; }
        .form-label { font-size:14px; font-weight:500; color:#4A5A6E; margin-bottom:6px; display:block; }
        .form-input { width:100%; padding:14px 16px; border-radius:16px; border:1px solid #E2E8F0; font-size:15px; }
        .form-input:focus { outline:none; border-color:#2B4BFF; }
        .btn { width:100%; padding:16px; background:#2B4BFF; color:white; border:none; border-radius:40px; font-size:16px; font-weight:600; cursor:pointer; margin:8px 0; }
        .btn:active { background:#1A3AD0; transform:scale(0.98); }
        .btn-danger { background:#FF6B6B; }
        .btn-danger:active { background:#FF5252; }
        .question-list { margin-top:12px; }
        .question-item { padding:16px; border-bottom:1px solid #EDF2F7; }
        .question-header { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; }
        .question-preview { font-size:15px; margin-bottom:8px; color:#1A2639; }
        .question-meta { display:flex; gap:12px; font-size:12px; color:#7F8C9F; }
        .action-icons { display:flex; gap:16px; margin-top:8px; }
        .action-icon { cursor:pointer; color:#2B4BFF; font-size:14px; padding:4px 8px; border-radius:20px; }
        .action-icon:active { background:#F0F4FF; }
        .image-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
        .image-item { background:#F8FAFE; border-radius:12px; padding:12px; text-align:center; cursor:pointer; }
        .image-item:active { background:#EDF2F7; }
        .image-preview { height:80px; background:linear-gradient(145deg,#2B4BFF,#8A6EFF); border-radius:8px; margin-bottom:6px; background-size:cover; background-position:center; }
        .image-name { font-size:11px; color:#4A5A6E; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .upload-zone { border:2px dashed #2B4BFF; border-radius:20px; padding:30px 16px; text-align:center; background:#F0F4FF; margin:16px 0; cursor:pointer; }
        .upload-zone:active { background:#E8F0FE; }
        .upload-icon { font-size:40px; margin-bottom:8px; }
        .vip-card { background:linear-gradient(145deg,#1A2639,#2A3850); border-radius:24px; padding:24px; color:white; margin-bottom:16px; }
        .vip-badge { background:rgba(255,255,255,0.15); padding:4px 12px; border-radius:30px; display:inline-block; font-size:12px; margin-bottom:12px; }
        .vip-price { font-size:36px; font-weight:700; margin-bottom:4px; }
        .vip-price small { font-size:14px; opacity:0.8; }
        .benefit-list { list-style:none; margin:16px 0; font-size:13px; }
        .benefit-list li { margin-bottom:8px; display:flex; align-items:center; gap:8px; }
        .mode-selector { display:flex; gap:8px; margin:16px 0; }
        .mode-card { flex:1; border:1px solid #EDF2F7; border-radius:16px; padding:12px; text-align:center; cursor:pointer; }
        .mode-card.active { border-color:#2B4BFF; background:#F0F4FF; }
        .mode-card:active { background:#F0F4FF; }
        .mode-icon { font-size:24px; margin-bottom:4px; }
        .filter-row { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin:16px 0; }
        .filter-select { padding:12px; border-radius:16px; border:1px solid #EDF2F7; font-size:14px; }
        .count-selector { display:flex; align-items:center; gap:16px; margin:16px 0; }
        .count-input { width:80px; padding:12px; border-radius:16px; border:1px solid #EDF2F7; text-align:center; }
        .quiz-container { background:white; border-radius:24px; padding:20px; }
        .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin:20px 0; }
        .option-item { padding:16px; background:#F8FAFE; border-radius:16px; text-align:center; cursor:pointer; border:2px solid transparent; }
        .option-item.selected { border-color:#2B4BFF; background:#F0F4FF; color:#2B4BFF; font-weight:500; }
        .option-item:active { background:#EDF2F7; }
        .fill-answer { width:100%; padding:16px; border-radius:16px; border:2px solid #EDF2F7; margin:20px 0; font-size:16px; }
        .action-buttons { display:flex; gap:8px; }
        .primary-btn, .secondary-btn { flex:1; padding:16px; border:none; border-radius:40px; font-size:15px; font-weight:600; cursor:pointer; }
        .primary-btn { background:#2B4BFF; color:white; }
        .primary-btn:active { background:#1A3AD0; }
        .secondary-btn { background:#F0F4FF; color:#2B4BFF; }
        .secondary-btn:active { background:#E8F0FE; }
        .result-card { margin-top:20px; padding:16px; background:#F8FAFE; border-radius:16px; display:flex; align-items:center; gap:12px; }
        .result-icon { font-size:32px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:1000; align-items:flex-end; }
        .modal.active { display:flex; }
        .modal-content { background:white; border-radius:24px 24px 0 0; padding:24px; width:100%; max-height:80vh; overflow-y:auto; animation:slideUp 0.3s ease; }
        @keyframes slideUp { from{ transform:translateY(100%); } to{ transform:translateY(0); } }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .modal-title { font-size:18px; font-weight:600; }
        .close-btn { font-size:24px; color:#7F8C9F; cursor:pointer; }
        .login-tabs { display:flex; gap:16px; margin-bottom:20px; border-bottom:1px solid #EDF2F7; padding-bottom:12px; }
        .login-tab { flex:1; text-align:center; padding:8px; cursor:pointer; color:#7F8C9F; }
        .login-tab.active { color:#2B4BFF; border-bottom:2px solid #2B4BFF; }
        .toast-message { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1A2639; color:white; padding:12px 24px; border-radius:40px; font-size:14px; z-index:2000; animation:fadeIn 0.3s ease; white-space:nowrap; max-width:90%; }
        @keyframes fadeIn { from{ opacity:0; transform:translate(-50%,-20px); } to{ opacity:1; transform:translate(-50%,0); } }
        @keyframes floatUp { 0%{ transform:translateY(0); opacity:1; } 100%{ transform:translateY(-100vh); opacity:0; } }
        .ai-assistant { position:fixed; bottom:20px; right:16px; background:white; border-radius:60px; padding:10px 16px; box-shadow:0 4px 16px rgba(43,75,255,0.2); display:flex; align-items:center; gap:6px; cursor:pointer; z-index:90; font-size:13px; }
        .ai-assistant:active { transform:scale(0.95); }
        .ai-avatar { width:32px; height:32px; border-radius:32px; background:linear-gradient(145deg,#2B4BFF,#8A6EFF); display:flex; align-items:center; justify-content:center; color:white; font-size:16px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <div class="logo-area">
                <span class="logo">学迹</span>
                <span class="date-badge" id="dateBadge">3月11日</span>
            </div>
            <div class="user-mini" id="userInfo">
                <div class="avatar-mini" id="userAvatar">📱</div>
                <span class="logout-icon" id="logoutBtn" style="display: none;" title="退出登录">🚪</span>
            </div>
        </div>

        <div class="nav-scroll">
            <div class="nav-items">
                <div class="nav-item active" data-module="dashboard"><span class="nav-icon">📊</span><span>看板</span></div>
                <div class="nav-item" data-module="subject"><span class="nav-icon">📚</span><span>学科</span></div>
                <div class="nav-item" data-module="input"><span class="nav-icon">✍️</span><span>录入</span></div>
                <div class="nav-item" data-module="bank"><span class="nav-icon">📋</span><span>题库</span></div>
                <div class="nav-item" data-module="batch"><span class="nav-icon">📁</span><span>批量</span></div>
                <div class="nav-item" data-module="image"><span class="nav-icon">🖼️</span><span>图片</span></div>
                <div class="nav-item" data-module="challenge"><span class="nav-icon">🎮</span><span>闯关</span></div>
                <div class="nav-item" data-module="vip"><span class="nav-icon">💎</span><span>会员</span></div>
                <div class="nav-item" data-module="bind"><span class="nav-icon">🔗</span><span>绑定</span></div>
            </div>
        </div>

        <div class="content-area" id="contentArea"></div>

        <div class="ai-assistant" id="aiAssistant">
            <div class="ai-avatar">AI</div>
            <div>助手</div>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">欢迎回来</span>
                <span class="close-btn" id="closeAuthModal">&times;</span>
            </div>
            <div class="login-tabs">
                <div class="login-tab active" id="loginTab">登录</div>
                <div class="login-tab" id="registerTab">注册</div>
            </div>
            <div id="loginForm">
                <input type="tel" class="form-input" id="loginPhone" placeholder="手机号">
                <input type="password" class="form-input" id="loginPassword" placeholder="密码">
                <button class="btn" id="loginBtn">登录</button>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="tel" class="form-input" id="registerPhone" placeholder="手机号">
                <input type="text" class="form-input" id="registerName" placeholder="昵称">
                <input type="password" class="form-input" id="registerPassword" placeholder="密码">
                <button class="btn" id="registerBtn">注册</button>
            </div>
        </div>
    </div>

    <div id="effectLayer" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;"></div>

    <script>
        (function() {
            // ========== 初始化 Supabase ==========
            const supabaseUrl = 'https://qvqbeunwgiwjtzmqpxuo.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2cWJldW53Z2l3anR6bXFweHVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyNjcsImV4cCI6MjA4ODg2NzI2N30.TgN4qWgmFsSeSStMXiYh-xzVW_kDqdk09CZFS8jQIR0';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            console.log('Supabase 初始化成功', supabase);

            // ========== 全局变量 ==========
            let currentUser = null;
            let questions = [];
            let subjects = ['数学', '英语', '物理', '化学'];
            let userProgress = {};
            let currentPractice = null;
            let currentUploadedFileUrl = null;

            // ========== 工具函数 ==========
            function showToast(msg) {
                const t = document.querySelector('.toast-message');
                if (t) t.remove();
                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }
            // 暴露给全局，供内联 onclick 调用
            window.showToast = showToast;

            function showEffect(type) {
                const layer = document.getElementById('effectLayer');
                layer.innerHTML = '';
                if (type === 'balloon') {
                    for (let i = 0; i < 6; i++) {
                        const b = document.createElement('span');
                        b.innerText = '🎈';
                        b.style.position = 'absolute';
                        b.style.left = Math.random() * 100 + '%';
                        b.style.bottom = '0';
                        b.style.fontSize = (30 + Math.random() * 30) + 'px';
                        b.style.animation = 'floatUp 2s ease-in forwards';
                        layer.appendChild(b);
                    }
                    setTimeout(() => layer.innerHTML = '', 2000);
                } else {
                    const m = document.createElement('div');
                    m.innerText = '👾';
                    m.style.fontSize = '60px';
                    m.style.position = 'absolute';
                    m.style.top = '50%';
                    m.style.left = '50%';
                    m.style.transform = 'translate(-50%, -50%)';
                    layer.appendChild(m);
                    setTimeout(() => layer.innerHTML = '', 1500);
                }
            }

            function updateDate() {
                const d = new Date();
                const month = d.getMonth() + 1;
                const day = d.getDate();
                document.getElementById('dateBadge').textContent = `${month}月${day}日`;
            }

            function updateUserUI() {
                const logoutBtn = document.getElementById('logoutBtn');
                if (currentUser) {
                    document.getElementById('userAvatar').textContent = '👤';
                    logoutBtn.style.display = 'inline';
                } else {
                    document.getElementById('userAvatar').textContent = '📱';
                    logoutBtn.style.display = 'none';
                }
            }

            // 更新掌握度（带重载）
            async function updateMastery(questionId, correct) {
                if (!currentUser) return;

                const { data: existing, error: findError } = await supabase
                    .from('progress')
                    .select('*')
                    .eq('user_id', currentUser._id)
                    .eq('question_id', questionId);
                if (findError) { console.error(findError); return; }

                if (existing.length > 0) {
                    const record = existing[0];
                    let newMastery = record.mastery;
                    if (correct) newMastery = Math.min(5, record.mastery + 1);
                    else newMastery = 0;
                    const { error: updateError } = await supabase
                        .from('progress')
                        .update({
                            mastery: newMastery,
                            last_review: new Date(),
                            history: [...(record.history || []), { time: new Date(), correct }]
                        })
                        .eq('id', record.id);
                    if (updateError) console.error(updateError);
                    else record.mastery = newMastery;
                } else {
                    const newMastery = correct ? 1 : 0;
                    const { error } = await supabase
                        .from('progress')
                        .insert([{
                            user_id: currentUser._id,
                            question_id: questionId,
                            mastery: newMastery,
                            last_review: new Date(),
                            history: [{ time: new Date(), correct }]
                        }]);
                    if (error) console.error(error);
                }
                // 重新加载进度
                const { data: pData } = await supabase
                    .from('progress')
                    .select('*')
                    .eq('user_id', currentUser._id);
                userProgress = {};
                pData.forEach(p => userProgress[p.question_id] = p);
            }

            function getMastery(questionId) {
                return userProgress[questionId]?.mastery || 0;
            }

            function openAuthModal() {
                document.getElementById('authModal').classList.add('active');
            }
            window.openAuthModal = openAuthModal; // 供内联调用

            function closeAuthModal() {
                document.getElementById('authModal').classList.remove('active');
            }
            window.closeAuthModal = closeAuthModal;

            // ========== 数据加载 ==========
            async function checkLogin() {
                const saved = localStorage.getItem('xueji_current');
                if (saved) {
                    currentUser = JSON.parse(saved);
                    updateUserUI();
                    await loadUserData();
                }
            }

            async function loadUserData() {
                if (!currentUser) return;

                const { data: qData, error: qError } = await supabase
                    .from('questions')
                    .select('*')
                    .eq('user_id', currentUser._id);
                if (qError) console.error(qError);
                else questions = qData;

                const { data: pData, error: pError } = await supabase
                    .from('progress')
                    .select('*')
                    .eq('user_id', currentUser._id);
                if (pError) console.error(pError);
                else {
                    userProgress = {};
                    pData.forEach(p => userProgress[p.question_id] = p);
                }
            }

            // ========== 页面加载函数 ==========
            function loadDashboard(area) {
                const total = questions.length;
                const mastered = Object.values(userProgress).filter(p => p.mastery >= 5).length;
                area.innerHTML = `
                    <div class="stat-grid">
                        <div class="stat-card" onclick="showToast('总题库：${total}题')">
                            <div class="stat-title">总题库</div><div class="stat-number">${total}</div>
                        </div>
                        <div class="stat-card" onclick="showToast('已掌握：${mastered}题')">
                            <div class="stat-title">已掌握</div><div class="stat-number">${mastered}</div>
                        </div>
                        <div class="stat-card" onclick="showToast('攻克中：${total-mastered}题')">
                            <div class="stat-title">攻克中</div><div class="stat-number">${total-mastered}</div>
                        </div>
                    </div>
                    <div class="section-card">
                        <div class="card-title">📊 掌握度分布</div>
                        ${['数学','英语','物理','化学'].map(s => {
                            const subQ = questions.filter(q => q.subject === s);
                            const subM = subQ.filter(q => userProgress[q.id]?.mastery >= 5).length;
                            const pct = subQ.length ? Math.round(subM/subQ.length*100) : 0;
                            return `
                                <div class="subject-item" onclick="showToast('${s}掌握度${pct}%')">
                                    <span class="subject-name">${s}</span>
                                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                                    <span class="subject-percent">${pct}%</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="section-card">
                        <div class="card-title">🔥 学科热力图</div>
                        <div class="heatmap-grid">
                            ${['数学','英语','物理','化学'].map((s,i) => `
                                <div class="heat-item" onclick="showToast('${s}热力图')">
                                    <div class="heat-subject">${s}</div>
                                    <div class="heat-bar"><div class="heat-fill" style="height:${[85,70,55,40][i]}%"></div></div>
                                    <div>${[85,70,55,40][i]}%</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            function loadSubject(area) {
                area.innerHTML = `
                    <div class="section-card">
                        <div class="card-title">📚 新增学科</div>
                        <div class="form-group"><input class="form-input" id="newSubject" placeholder="学科名称"></div>
                        <div class="form-group"><input class="form-input" id="newGrade" placeholder="年级预设（用逗号分隔）"></div>
                        <div class="form-group"><input class="form-input" id="newChapter" placeholder="章节预设"></div>
                        <button class="btn" id="addSubjectBtn">添加学科</button>
                    </div>
                    <div class="section-card">
                        <div class="card-title">已有学科</div>
                        <div id="subjectList">
                            ${subjects.map((s, index) => `
                                <div class="subject-item" style="justify-content:space-between;" data-index="${index}">
                                    <span style="font-weight:500;">${s}</span>
                                    <div>

            // 批量导入：增强版，带模板下载和实际导入
            function loadBatchImport(area) {
                area.innerHTML = `
                    <div class="section-card">
                        <div class="card-title">📁 批量导入</div>
                        <div style="margin-bottom:16px; background:#F0F4FF; padding:16px; border-radius:16px;">
                            <p style="margin-bottom:8px;"><strong>使用说明：</strong></p>
                            <ul style="margin-left:20px; color:#4A5A6E; font-size:14px;">
                                <li>下载CSV模板，按格式填写题目数据。</li>
                                <li>支持列：年级,章节,题目,答案,来源,学科(可选，默认为选择的目标学科)</li>
                                <li>如果题目是选择题，请在“题目”列中包含 A. xxx B. xxx 等选项，系统会自动识别。</li>
                                <li>点击“选择文件”上传CSV，然后点击“开始导入”。</li>
                            </ul>
                            <button class="action-btn" id="downloadTemplateBtn" style="margin-top:8px;">📥 下载模板</button>
                        </div>
                        <div class="form-group">
                            <label class="form-label">选择目标学科（作为默认学科）</label>
                            <select class="form-input" id="batchSubject">${subjects.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
                        </div>
                        <div class="upload-zone" id="dropZone">
                            <div class="upload-icon">📂</div>
                            <div>点击或拖拽 CSV 文件到此处</div>
                            <div style="font-size:12px; color:#7F8C9F;">支持格式：年级,章节,题目,答案,来源,学科(可选)</div>
                        </div>
                        <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
                        <button class="btn" id="startImportBtn">开始导入</button>
                        <div id="importProgress" style="margin-top:16px; display:none;">正在导入...</div>
                    </div>
                `;

                // 下载模板
                document.getElementById('downloadTemplateBtn').addEventListener('click', () => {
                    const template = '年级,章节,题目,答案,来源,学科\n五年级,小数乘法,0.5×2=?,1,课本,数学\n六年级,词汇,苹果的英文？,apple,练习册,英语';
                    const blob = new Blob(['\uFEFF' + template], { type: 'text/csv;charset=utf-8;' }); // 添加BOM使中文不乱码
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'import_template.csv';
                    link.click();
                });

                const dropZone = document.getElementById('dropZone');
                const fileInput = document.getElementById('csvFileInput');
                dropZone.addEventListener('click', () => fileInput.click());

                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.style.background = '#E8F0FE';
                });
                dropZone.addEventListener('dragleave', () => {
                    dropZone.style.background = '#F0F4FF';
                });
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.style.background = '#F0F4FF';
                    const file = e.dataTransfer.files[0];
                    if (file && file.name.endsWith('.csv')) {
                        fileInput.files = e.dataTransfer.files;
                        showToast(`已选择文件: ${file.name}`);
                    } else {
                        showToast('请选择CSV文件');
                    }
                });

                fileInput.addEventListener('change', () => {
                    if (fileInput.files.length > 0) {
                        showToast(`已选择文件: ${fileInput.files[0].name}`);
                    }
                });

                document.getElementById('startImportBtn').addEventListener('click', async () => {
                    if (!currentUser) { showToast('请先登录'); openAuthModal(); return; }
                    if (!fileInput.files.length) { showToast('请先选择CSV文件'); return; }

                    const subjectDefault = document.getElementById('batchSubject').value;
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const content = e.target.result;
                        const lines = content.split(/\r?\n/).filter(line => line.trim() !== '');
                        if (lines.length < 2) { showToast('CSV至少需要标题行和一行数据'); return; }

                        const headers = lines[0].split(',').map(h => h.trim());
                        const required = ['年级', '章节', '题目', '答案'];
                        const missing = required.filter(r => !headers.includes(r));
                        if (missing.length) {
                            showToast(`CSV缺少必要列: ${missing.join(', ')}`);
                            return;
                        }

                        const progressDiv = document.getElementById('importProgress');
                        progressDiv.style.display = 'block';
                        progressDiv.textContent = '正在导入...';

                        let success = 0;
                        for (let i = 1; i < lines.length; i++) {
                            const values = lines[i].split(',').map(v => v.trim());
                            const row = {};
                            headers.forEach((h, idx) => row[h] = values[idx] || '');

                            // 确定学科：优先使用CSV中的学科列，否则用默认学科
                            let subject = row['学科'] || subjectDefault;
                            if (!subject) subject = '数学'; // 兜底

                            // 自动识别是否为选择题（如果题目中包含 A. 或 B. 等）
                            let options = null;
                            if (row['题目'].includes('A.') || row['题目'].includes('B.')) {
                                options = ['A','B','C','D']; // 简化，实际可以提取选项
                            }

                            const questionData = {
                                user_id: currentUser._id,
                                subject,
                                chapter: row['章节'] || '',
                                question: row['题目'] || '',
                                answer: row['答案'] || '',
                                options,
                                source: row['来源'] || '',
                                grade: row['年级'] || '',
                                image_url: null,
                                created_at: new Date()
                            };

                            const { error } = await supabase.from('questions').insert([questionData]);
                            if (!error) success++;
                        }
                        progressDiv.style.display = 'none';
                        showToast(`导入完成！成功 ${success} 条，失败 ${lines.length-1-success} 条`);
                        fileInput.value = ''; // 清空
                    };
                    reader.readAsText(file, 'UTF-8');
                });
            }

            function showQuestion(idx) {
                if (!currentPractice) return;
                const q = currentPractice.questions[idx];
                const isChoice = q.options && q.options.length;
                const isLast = idx === currentPractice.questions.length - 1;
                let html = `
                    <div class="quiz-container">
                        <div style="display:flex; justify-content:space-between; margin-bottom:16px;"><span>${q.subject} · ${q.chapter}</span><span>${idx+1}/${currentPractice.questions.length}</span></div>
                        <div style="font-size:18px; margin-bottom:20px;">${q.question}</div>
                `;
                if (isChoice) {
                    html += `<div class="options-grid">${q.options.map(opt => `<div class="option-item" data-opt="${opt}">${opt}</div>`).join('')}</div>`;
                } else {
                    html += `<input class="fill-answer" id="answerInput" placeholder="输入答案">`;
                }
                html += `
                        <div class="action-buttons">
                            <button class="primary-btn" id="submitBtn">提交</button>
                            ${!isLast ? '<button class="secondary-btn" id="nextBtn">下一题</button>' : ''}
                        </div>
                        <div id="resultArea"></div>
                    </div>
                `;
                document.getElementById('contentArea').innerHTML = html;
                if (isChoice) {
                    document.querySelectorAll('.option-item').forEach(opt => {
                        opt.addEventListener('click', function() {
                            document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
                            this.classList.add('selected');
                        });
                    });
                }
                document.getElementById('submitBtn').addEventListener('click', async () => {
                    let userAns = '', correct = false;
                    if (isChoice) {
                        const selected = document.querySelector('.option-item.selected');
                        if (!selected) { showToast('请选择一个选项'); return; }
                        userAns = selected.dataset.opt;
                        correct = userAns === q.answer;
                    } else {
                        userAns = document.getElementById('answerInput')?.value || '';
                        correct = userAns.trim().toLowerCase() === q.answer.trim().toLowerCase();
                    }
                    await updateMastery(q.id, correct);
                    currentPractice.answers.push({ correct });
                    showEffect(correct ? 'balloon' : 'monster');
                    document.getElementById('resultArea').innerHTML = `
                        <div class="result-card">
                            <span class="result-icon">${correct ? '🎉' : '💪'}</span>
                            <div><div style="font-weight:600;">${correct ? '答对了！' : '再接再厉'}</div><div style="font-size:13px; color:#7F8C9F;">${correct ? '掌握度+1' : '正确答案：'+q.answer}</div></div>
                        </div>
                    `;
                    if (idx === currentPractice.questions.length - 1) {
                        setTimeout(() => {
                            const correctCount = currentPractice.answers.filter(a => a.correct).length;
                            showToast(`完成！正确率 ${correctCount}/${currentPractice.questions.length}`);
                            loadContent('challenge');
                            currentPractice = null;
                        }, 2000);
                    }
                });
                if (document.getElementById('nextBtn')) {
                    document.getElementById('nextBtn').addEventListener('click', () => {
                        if (idx < currentPractice.questions.length - 1) showQuestion(idx + 1);
                    });
                }
            }

            function loadContent(module) {
                const area = document.getElementById('contentArea');
                switch(module) {
                    case 'dashboard': loadDashboard(area); break;
                    case 'subject': loadSubject(area); break;
                    case 'input': loadQuestionInput(area); break;
                    case 'bank': loadQuestionBank(area); break;
                    case 'batch': loadBatchImport(area); break;
                    case 'image': loadImageSpace(area); break;
                    case 'challenge': loadChallenge(area); break;
                    case 'vip': loadVIP(area); break;
                    case 'bind': loadAccountBind(area); break;
                    default: loadDashboard(area);
                }
            }

            // ========== 全局事件绑定 ==========
            function bindGlobalEvents() {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        e.stopPropagation();
                        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                        this.classList.add('active');
                        const module = this.dataset.module;
                        loadContent(module);
                    });
                });

                document.getElementById('userInfo').addEventListener('click', (e) => {
                    if (e.target.classList.contains('logout-icon')) return;
                    if (currentUser) {
                        showToast(`当前用户：${currentUser.name}`);
                    } else {
                        openAuthModal();
                    }
                });

                document.getElementById('aiAssistant').addEventListener('click', () => showToast('AI助手：请描述问题'));
                document.getElementById('closeAuthModal').addEventListener('click', closeAuthModal);

                document.getElementById('logoutBtn').addEventListener('click', async function(e) {
                    e.stopPropagation();
                    if (confirm('确定退出登录吗？')) {
                        currentUser = null;
                        localStorage.removeItem('xueji_current');
                        questions = [];
                        userProgress = {};
                        updateUserUI();
                        showToast('已退出登录');
                        loadContent('dashboard');
                    }
                });

                document.getElementById('loginTab').addEventListener('click', function() {
                    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('registerForm').style.display = 'none';
                });

                document.getElementById('registerTab').addEventListener('click', function() {
                    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'block';
                });

                document.getElementById('loginBtn').addEventListener('click', async function() {
                    const phone = document.getElementById('loginPhone').value;
                    const pwd = document.getElementById('loginPassword').value;
                    if (!phone || !pwd) {
                        showToast('请填写手机号和密码');
                        return;
                    }

                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('phone', phone)
                        .eq('password', pwd);

                    if (error || data.length === 0) {
                        showToast('手机号或密码错误');
                        return;
                    }
                    const user = data[0];
                    currentUser = {
                        _id: user.id,
                        phone: user.phone,
                        name: user.name,
                        createdAt: user.created_at
                    };
                    localStorage.setItem('xueji_current', JSON.stringify(currentUser));
                    updateUserUI();
                    closeAuthModal();
                    await loadUserData();
                    showToast('登录成功');
                    loadContent('dashboard');
                });

                document.getElementById('registerBtn').addEventListener('click', async function() {
                    const phone = document.getElementById('registerPhone').value;
                    const name = document.getElementById('registerName').value || '用户' + phone.substr(-4);
                    const pwd = document.getElementById('registerPassword').value;

                    if (!phone || phone.length !== 11) {
                        showToast('请输入正确的手机号');
                        return;
                    }
                    if (!pwd || pwd.length < 6) {
                        showToast('密码至少6位');
                        return;
                    }

                    const { data: existing, error: checkError } = await supabase
                        .from('users')
                        .select('phone')
                        .eq('phone', phone);
                    if (checkError) { console.error(checkError); showToast('注册失败'); return; }
                    if (existing.length > 0) {
                        showToast('该手机号已注册');
                        return;
                    }

                    const { data, error } = await supabase
                        .from('users')
                        .insert([{ phone, name, password: pwd, created_at: new Date() }])
                        .select();

                    if (error) {
                        console.error(error);
                        showToast('注册失败');
                        return;
                    }

                    const newUser = data[0];
                    currentUser = {
                        _id: newUser.id,
                        phone: newUser.phone,
                        name: newUser.name,
                        createdAt: newUser.created_at
                    };
                    localStorage.setItem('xueji_current', JSON.stringify(currentUser));
                    updateUserUI();
                    closeAuthModal();
                    showToast('注册成功');
                    loadContent('dashboard');
                });

                document.getElementById('authModal').addEventListener('click', function(e) {
                    if (e.target === this) closeAuthModal();
                });
            }

            // ========== 启动应用 ==========
            async function init() {
                console.log('应用启动');
                await checkLogin();
                updateDate();
                loadContent('dashboard');
                bindGlobalEvents();
            }

            init();
        })();
    </script>
</body>
</html>
